<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEXAWARE APTITUDE · Day-1 Sprint</title>
<style>
:root{--font:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif}
html[data-theme="light"]{
  --bg:#eef2f8;--bg-grad:linear-gradient(135deg,#eef2f8 0%,#e3ecf7 100%);
  --surface:rgba(255,255,255,0.72);--surface-solid:#ffffff;--surface-2:rgba(245,248,253,0.9);
  --glass:rgba(255,255,255,0.55);--border:rgba(15,40,80,0.12);--border-strong:rgba(15,40,80,0.22);
  --text:#0f213b;--text-soft:#43556f;--text-mute:#7488a3;--primary:#2563eb;--primary-2:#7c3aed;--accent:#06b6d4;
  --grad:linear-gradient(135deg,#2563eb 0%,#7c3aed 50%,#06b6d4 100%);--grad-warm:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);
  --good:#16a34a;--warn:#d97706;--bad:#dc2626;--shadow:0 10px 30px rgba(20,40,90,0.12);--shadow-lg:0 20px 60px rgba(20,40,90,0.18);
  --hover:rgba(37,99,235,0.08);--code-bg:rgba(15,33,59,0.06);--flash-back:linear-gradient(135deg,#1e3a8a 0%,#6d28d9 100%);--scrollbar:rgba(37,99,235,0.35);
}
html[data-theme="oled"]{
  --bg:#000000;--bg-grad:linear-gradient(135deg,#050507 0%,#0a0c12 100%);
  --surface:rgba(18,20,28,0.78);--surface-solid:#0c0e14;--surface-2:rgba(22,25,34,0.92);
  --glass:rgba(20,23,33,0.6);--border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.16);
  --text:#f1f5fb;--text-soft:#b9c4d6;--text-mute:#7d8aa0;--primary:#4f86ff;--primary-2:#a473ff;--accent:#22d3ee;
  --grad:linear-gradient(135deg,#4f86ff 0%,#a473ff 50%,#22d3ee 100%);--grad-warm:linear-gradient(135deg,#f59e0b 0%,#ef4444 100%);
  --good:#34d399;--warn:#fbbf24;--bad:#f87171;--shadow:0 10px 30px rgba(0,0,0,0.6);--shadow-lg:0 24px 70px rgba(0,0,0,0.8);
  --hover:rgba(79,134,255,0.14);--code-bg:rgba(255,255,255,0.05);--flash-back:linear-gradient(135deg,#2b3a8f 0%,#7c3aed 100%);--scrollbar:rgba(79,134,255,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);background-image:var(--bg-grad);color:var(--text);line-height:1.55;overflow:hidden;transition:background .4s ease,color .4s ease}
::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:10px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--primary);background-clip:content-box}
*{-ms-overflow-style:none;scrollbar-width:thin;scrollbar-color:var(--scrollbar) transparent}
header.appbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.4px;white-space:nowrap}
.logo .mark{width:38px;height:38px;border-radius:11px;background:var(--grad);display:grid;place-items:center;color:#fff;font-weight:900;font-size:18px;box-shadow:0 6px 18px rgba(37,99,235,.4)}
.logo small{display:block;font-size:10px;font-weight:600;color:var(--text-mute);letter-spacing:1px}
.progress-wrap{flex:1;min-width:120px;display:flex;align-items:center;gap:12px}
.progress-bar{flex:1;height:10px;border-radius:20px;background:var(--code-bg);overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;width:0%;background:var(--grad);border-radius:20px;transition:width .5s cubic-bezier(.16,1,.3,1);box-shadow:0 0 14px rgba(37,99,235,.5)}
.progress-pct{font-weight:800;font-size:13px;min-width:42px;text-align:right;color:var(--primary)}
.appbar .spacer{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:11px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-weight:600;font-size:13px;cursor:pointer;transition:all .2s ease;white-space:nowrap}
.btn:hover{background:var(--hover);border-color:var(--border-strong);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn:active{transform:translateY(0)}
.btn.primary{background:var(--grad);color:#fff;border:none;box-shadow:0 6px 18px rgba(37,99,235,.35)}
.btn.icon{padding:9px;width:40px;height:40px}
.btn.toggled{background:var(--grad);color:#fff;border:none}
.toggle-wrap{display:flex;align-items:center;gap:6px}
.toggle-wrap span{font-size:11px;color:var(--text-mute);font-weight:600}
.layout{display:flex;height:calc(100vh - 65px)}
.sidebar{width:280px;flex-shrink:0;height:100%;overflow-y:auto;background:var(--surface);backdrop-filter:blur(14px);border-right:1px solid var(--border);padding:16px 12px;transition:width .3s ease,transform .3s ease}
.sidebar.collapsed{width:64px}
.sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text-mute);margin:6px 8px 12px}
.sidebar.collapsed h3,.sidebar.collapsed .nav-label{display:none}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:12px;cursor:pointer;margin-bottom:6px;transition:all .2s ease;border:1px solid transparent}
.nav-item:hover{background:var(--hover);transform:translateX(3px)}
.nav-item.active{background:var(--grad);color:#fff;box-shadow:0 8px 20px rgba(37,99,235,.35)}
.nav-item.active .nav-num{background:rgba(255,255,255,.25)}
.nav-num{width:30px;height:30px;border-radius:9px;flex-shrink:0;background:var(--code-bg);display:grid;place-items:center;font-weight:800;font-size:13px}
.nav-label{flex:1;font-size:13.5px;font-weight:600}
.nav-status{font-size:14px;display:flex;align-items:center}
.status-done{color:var(--good)}
.status-review{color:var(--warn)}
.status-skip{color:var(--text-mute)}
.sidebar-foot{margin-top:18px;padding:12px;border-radius:12px;background:var(--code-bg);font-size:11px;color:var(--text-mute)}
main{flex:1;height:100%;overflow-y:auto;padding:24px 30px 80px;scroll-behavior:smooth}
.section-card{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:18px;padding:22px 24px;margin-bottom:22px;box-shadow:var(--shadow);transition:transform .25s ease,box-shadow .25s ease}
.section-card:hover{box-shadow:var(--shadow-lg)}
.section-title{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;margin-bottom:14px}
.section-title .ic{font-size:20px}
.topic-head{display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap}
.topic-head .big-ic{width:64px;height:64px;border-radius:16px;background:var(--grad);display:grid;place-items:center;font-size:32px;color:#fff;box-shadow:0 10px 26px rgba(37,99,235,.4)}
.topic-head h1{font-size:26px;font-weight:900;letter-spacing:.3px}
.topic-head .sub{color:var(--text-soft);font-size:14px;max-width:680px;margin-top:4px}
.bookmark-btn{margin-left:auto;padding:10px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface-2);cursor:pointer;font-weight:700;display:flex;align-items:center;gap:8px;transition:all .2s}
.bookmark-btn:hover{background:var(--hover);transform:translateY(-2px)}
.bookmark-btn.active{background:var(--grad);color:#fff;border:none}
.formula-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:16px}
.flashcard{perspective:1200px;height:200px;cursor:pointer}
.flash-inner{position:relative;width:100%;height:100%;transition:transform .7s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
.flashcard.flipped .flash-inner{transform:rotateY(180deg)}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;border:1px solid var(--border);background:var(--surface-2);padding:16px;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s;overflow:auto}
.flash-front{justify-content:center;align-items:flex-start;gap:8px}
.flash-front .fname{font-weight:800;font-size:15px;color:var(--primary)}
.flash-front .fformula{font-family:'Cascadia Code',Consolas,monospace;background:var(--code-bg);padding:6px 10px;border-radius:8px;font-size:13px;width:100%;word-break:break-word}
.flash-front .hint{font-size:11px;color:var(--text-mute);margin-top:auto}
.flash-back{transform:rotateY(180deg);background:var(--flash-back);color:#fff}
.flash-back .bname{font-weight:800;margin-bottom:6px}
.flash-back .bform{font-family:'Cascadia Code',Consolas,monospace;background:rgba(255,255,255,.14);padding:8px 10px;border-radius:8px;font-size:12.5px;word-break:break-word;margin-bottom:8px}
.flash-back .bshort{font-size:12px;background:rgba(255,255,255,.14);padding:6px 9px;border-radius:8px}
.formula-grid .flashcard:hover .flash-face{box-shadow:var(--shadow-lg);transform:translateY(-4px)}
.acc{border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;background:var(--surface-2)}
.acc-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;font-weight:700;user-select:none;transition:background .2s}
.acc-head:hover{background:var(--hover)}
.acc-head .chev{margin-left:auto;transition:transform .3s ease;font-size:13px;color:var(--text-mute)}
.acc.open .acc-head .chev{transform:rotate(180deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .4s ease;padding:0 18px}
.acc.open .acc-body{max-height:2400px;padding:4px 18px 18px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.4px}
.badge.easy{background:rgba(22,163,74,.15);color:var(--good);border:1px solid rgba(22,163,74,.3)}
.badge.moderate{background:rgba(217,119,6,.15);color:var(--warn);border:1px solid rgba(217,119,6,.3)}
.badge.hard{background:rgba(220,38,38,.15);color:var(--bad);border:1px solid rgba(220,38,38,.3)}
.mini{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.mini .row{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.mini .k{font-weight:700;color:var(--primary);font-size:13px}
.mini .v{font-size:13px;color:var(--text-soft)}
.code{font-family:'Cascadia Code',Consolas,monospace;background:var(--code-bg);padding:8px 12px;border-radius:9px;font-size:12.5px;white-space:pre-wrap;color:var(--text);border:1px solid var(--border);margin-top:6px;display:block;overflow-x:auto}
table.matrix{width:100%;border-collapse:collapse;font-size:13px;overflow:hidden;border-radius:12px}
table.matrix th{background:var(--code-bg);text-align:left;padding:10px 12px;font-weight:800;color:var(--text-soft);border-bottom:1px solid var(--border)}
table.matrix td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-soft);vertical-align:top}
table.matrix tr:hover td{background:var(--hover)}
table.matrix code{font-family:'Cascadia Code',Consolas,monospace;background:var(--code-bg);padding:2px 6px;border-radius:6px}
.weight-bar{height:7px;border-radius:6px;background:var(--grad);display:inline-block}
.diagram-card svg{width:100%;height:auto;border-radius:14px;background:var(--surface-2);border:1px solid var(--border)}
.qa-block{border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;background:var(--surface-2)}
.qa-q{font-weight:800;font-size:15px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.qa-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.opt{padding:11px 14px;border:1px solid var(--border);border-radius:11px;cursor:pointer;font-size:13.5px;transition:all .2s;background:var(--surface)}
.opt:hover{border-color:var(--primary);background:var(--hover)}
.opt.sel{border-color:var(--primary);background:var(--hover)}
.opt.correct{background:rgba(22,163,74,.18);border-color:var(--good);color:var(--good);font-weight:700}
.opt.wrong{background:rgba(220,38,38,.16);border-color:var(--bad);color:var(--bad);font-weight:700}
.qa-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.qa-fb{margin-top:12px;font-weight:700}
.qa-fb.ok{color:var(--good)}
.qa-fb.no{color:var(--bad)}
.explain{margin-top:12px;background:var(--code-bg);border-radius:12px;padding:14px;border:1px solid var(--border);display:none}
.explain.show{display:block}
.step{display:flex;gap:10px;margin-bottom:8px;font-size:13px}
.step .n{width:24px;height:24px;border-radius:50%;background:var(--grad);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0}
.step .m{font-family:'Cascadia Code',Consolas,monospace;color:var(--primary);font-weight:700}
textarea.notes{width:100%;min-height:120px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);padding:14px;font-family:var(--font);font-size:13.5px;resize:vertical;transition:border .2s}
textarea.notes:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--hover)}
.notes-saved{font-size:11px;color:var(--good);margin-top:6px;opacity:0;transition:opacity .3s}
.notes-saved.show{opacity:1}
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.comp{padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--surface)}
.comp .cn{font-weight:800;font-size:14px}
.comp .ca{font-size:12px;color:var(--text-soft);margin-top:4px}
.timer-widget{position:fixed;right:24px;bottom:24px;z-index:80;width:230px;background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--border-strong);border-radius:18px;box-shadow:var(--shadow-lg);overflow:hidden;user-select:none}
.timer-head{display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--grad);color:#fff;cursor:grab;font-weight:700;font-size:13px}
.timer-head:active{cursor:grabbing}
.timer-head .tdot{width:9px;height:9px;border-radius:50%;background:#fff;opacity:.9}
.timer-head .tmode{margin-left:auto;font-size:11px;opacity:.9}
.timer-body{padding:16px 14px;text-align:center}
.timer-display{font-family:'Cascadia Code',Consolas,monospace;font-size:30px;font-weight:800;letter-spacing:1px}
.timer-display.warn{color:var(--bad);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.55}}
.timer-ctrls{display:flex;gap:8px;justify-content:center;margin-top:12px}
.timer-ctrls .btn{padding:7px 12px;font-size:12px}
.search-overlay{position:fixed;inset:0;z-index:100;background:rgba(5,10,25,.55);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;padding-top:90px}
.search-overlay.open{display:flex}
.search-box{width:min(640px,92vw);background:var(--surface-solid);border-radius:18px;border:1px solid var(--border-strong);box-shadow:var(--shadow-lg);overflow:hidden}
.search-input-wrap{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border)}
.search-input-wrap input{flex:1;border:none;background:transparent;font-size:16px;color:var(--text);outline:none;font-family:var(--font)}
.search-input-wrap .kbd{font-size:11px;color:var(--text-mute);border:1px solid var(--border);border-radius:6px;padding:2px 7px}
.search-results{max-height:60vh;overflow-y:auto;padding:8px}
.search-res{display:flex;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .15s}
.search-res:hover{background:var(--hover)}
.search-res .st{font-weight:800;color:var(--primary);min-width:120px;font-size:13px}
.search-res .sb{font-size:13px;color:var(--text-soft)}
.search-res .stype{font-size:10px;color:var(--text-mute);text-transform:uppercase;letter-spacing:1px}
.search-empty{padding:30px;text-align:center;color:var(--text-mute)}
.menu-overlay{position:fixed;inset:0;z-index:90;background:rgba(5,10,25,.45);backdrop-filter:blur(4px);display:none}
.menu-overlay.open{display:block}
.menu-panel{position:absolute;top:0;right:0;height:100%;width:300px;background:var(--surface-solid);border-left:1px solid var(--border);padding:24px;box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .3s ease}
.menu-panel.open{transform:translateX(0)}
.menu-panel h4{font-size:12px;text-transform:uppercase;letter-spacing:1.3px;color:var(--text-mute);margin:18px 0 10px}
.menu-panel .row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.menu-close{float:right;cursor:pointer;font-size:22px;color:var(--text-mute)}
.tag{display:inline-block;background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:3px 9px;font-size:11px;margin:3px;color:var(--text-soft)}
.hidden-rev{display:none!important}
@media(max-width:860px){
  .sidebar{position:fixed;left:0;top:65px;z-index:70;transform:translateX(0);box-shadow:var(--shadow-lg)}
  .sidebar.collapsed{transform:translateX(-100%)}
  .qa-opts{grid-template-columns:1fr}
  .logo span.full{display:none}
  main{padding:18px 14px 80px}
  .progress-wrap .progress-bar{min-width:60px}
}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface-solid);border:1px solid var(--border-strong);padding:12px 20px;border-radius:12px;box-shadow:var(--shadow-lg);z-index:120;opacity:0;transition:all .3s;font-weight:600}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header class="appbar">
  <button class="btn icon" id="hamburger" title="Menu">&#9776;</button>
  <button class="btn icon" id="sideToggle" title="Toggle sidebar">&#9776;</button>
  <div class="logo"><div class="mark">H</div><div><span class="full">HEXAWARE APTITUDE</span><small>DAY-1 SPRINT</small></div></div>
  <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="progFill"></div></div><div class="progress-pct" id="progPct">0%</div></div>
  <button class="btn" id="prevBtn">&#8592; Prev</button>
  <button class="btn primary" id="nextBtn">Next &#8594;</button>
  <button class="btn icon" id="searchBtn" title="Search (Ctrl+K)">&#128269;</button>
  <div class="toggle-wrap"><button class="btn icon" id="revToggle" title="Revision Mode">&#128338;</button><span>Rev</span></div>
  <div class="toggle-wrap"><button class="btn icon" id="themeToggle" title="Theme">&#9788;</button></div>
</header>
<div class="layout">
  <aside class="sidebar" id="sidebar"><h3>11 Topics</h3><div id="navList"></div><div class="sidebar-foot">Tip: Press <b>Ctrl+K</b> to search. Drag the timer by its header.</div></aside>
  <main id="main"></main>
</div>
<div class="timer-widget" id="timerWidget">
  <div class="timer-head" id="timerHead"><span class="tdot"></span><span id="timerTitle">Study Timer</span><span class="tmode" id="timerMode">COUNT UP</span></div>
  <div class="timer-body"><div class="timer-display" id="timerDisplay">00:00</div>
    <div class="timer-ctrls"><button class="btn" id="timerStart">Start</button><button class="btn" id="timerReset">Reset</button><button class="btn" id="timerSwitch">&#8646; Mode</button></div>
  </div>
</div>
<div class="search-overlay" id="searchOverlay"><div class="search-box">
  <div class="search-input-wrap"><span>&#128269;</span><input type="text" id="searchInput" placeholder="Search formulas, keywords, tricks..."><span class="kbd">ESC</span></div>
  <div class="search-results" id="searchResults"></div>
</div></div>
<div class="menu-overlay" id="menuOverlay"><div class="menu-panel" id="menuPanel">
  <span class="menu-close" id="menuClose">&times;</span>
  <h4>Quick Settings</h4>
  <div class="row"><span>Theme</span><button class="btn" id="menuTheme">Toggle</button></div>
  <div class="row"><span>Revision Mode</span><button class="btn" id="menuRev">Toggle</button></div>
  <div class="row"><span>Sidebar</span><button class="btn" id="menuSide">Toggle</button></div>
  <h4>Bookmarked Topics</h4><div id="menuBookmarks"><span class="tag">None yet</span></div>
  <h4>Keyboard</h4><div class="tag">Ctrl+K Search</div><div class="tag">&larr;/&rarr; Prev/Next</div><div class="tag">R Revision</div>
</div></div>
<div class="toast" id="toast"></div>
<script>
/* ============================================================ TOPIC DATA ============================================================ */
const TopicData = {
percentage:{
  title:"Percentage",icon:"%",subtitle:"The foundation topic — converts fractions, measures change, and powers DI, P&L and Time & Work.",
  intro:"Percentage is the most frequently asked topic in Hexaware's aptitude rounds. It forms the foundation for Data Interpretation, Profit & Loss, and Time & Work. Companies like Hexaware, TCS, and Infosys test your ability to convert fractions to percentages, calculate successive changes, and solve real-world scenarios under time pressure.",
  formulas:[
    {name:"Basic Percentage",formula:"P% of X = (P/100) × X",explanation:"Find a part of a whole expressed as a percent.",meaning:"Percentage means 'per hundred'.",shortcut:"Move decimal two places: 20% of 80 = 0.2×80 = 16.",notes:"Always 'of' = multiply."},
    {name:"Percentage Change",formula:"((New − Old)/Old) × 100",explanation:"Measures relative increase or decrease.",meaning:"Positive = growth, negative = loss.",shortcut:"If New=120,Old=100 then 20% increase.",notes:"Base is always the OLD value."},
    {name:"Successive Percentage",formula:"a + b + (ab/100)",explanation:"Net effect of two consecutive % changes.",meaning:"ab = product term, can be negative.",shortcut:"+10% then −10% → 10−10−1 = −1% net loss.",notes:"Use negative b for decrease."},

  title:"Ratio & Proportion",icon:"\u2236",subtitle:"The backbone of partnership, mixture and data interpretation problems.",
  intro:"Ratio and Proportion is the backbone of partnership problems, mixture problems, and data interpretation. Hexaware tests this topic through direct proportion questions, chain rule problems, and partnership sharing.",
  formulas:[
    {name:"Basic Ratio",formula:"a : b = a/b",explanation:"Compares two quantities.",meaning:"A fraction written with a colon.",shortcut:"Divide both by HCF to simplify.",notes:"Ratio has no units."},
    {name:"Proportion",formula:"a/b = c/d  ⇒  ad = bc",explanation:"Two ratios are equal.",meaning:"Cross-multiplication rule.",shortcut:"ad = bc always.",notes:"Product of means = product of extremes."},
    {name:"Direct Proportion",formula:"A1/A2 = B1/B2",explanation:"As one rises, other rises.",meaning:"Linear positive relation.",shortcut:"More men → more work.",notes:"Graph is a straight line through origin."},
    {name:"Inverse Proportion",formula:"A1×B1 = A2×B2",explanation:"As one rises, other falls.",meaning:"Product stays constant.",shortcut:"More men → fewer days.",notes:"Speed × Time = Distance."},
    {name:"Compound Ratio",formula:"(a:b)∘(c:d) = ac : bd",explanation:"Product of two ratios.",meaning:"Combine multiple ratios.",shortcut:"Multiply numerators and denominators.",notes:"Used to merge chains."},
    {name:"Duplicate Ratio",formula:"a² : b²",explanation:"Square of a ratio.",meaning:"Ratio of squares.",shortcut:"Just square both terms.",notes:"Triplicate = cubes."},
    {name:"Chain Rule",formula:"(M1×D1×H1)/W1 = (M2×D2×H2)/W2",explanation:"Work equivalence across setups.",meaning:"Man-days-hours balance.",shortcut:"Keep unknown on one side.",notes:"H = hours/day."},
    {name:"Partnership Profit",formula:"Share = (Invest×Time) / Σ(Invest×Time)",explanation:"Split profit by capital-time.",meaning:"Investment weighted by duration.",shortcut:"Multiply each partner's inv×time.",notes:"Time in same units."},
    {name:"Alligation Ratio",formula:"(Higher−Mean) : (Mean−Lower)",explanation:"Ratio to mix two items.",meaning:"Cross difference.",shortcut:"Big diff on top-left.",notes:"See Alligation topic."}
  ],
  whenToUse:[
    {condition:"Compare two homogeneous quantities",formula:"a : b",reason:"Express relative size.",shortcut:"Simplify by HCF.",examTrick:"Always reduce ratio."},
    {condition:"One quantity depends positively on another",formula:"A1/A2 = B1/B2",reason:"Direct variation.",shortcut:"Set up proportion.",examTrick:"Double input → double output."},
    {condition:"One quantity depends inversely",formula:"A1×B1 = A2×B2",reason:"Inverse variation.",shortcut:"Product constant.",examTrick:"Halve speed → double time."},
    {condition:"Split partnership profit",formula:"(Inv×Time)/Total",reason:"Fair share by capital-time.",shortcut:"Compute inv×time each.",examTrick:"Ignoring time is the trap."},
    {condition:"Mix two concentrations",formula:"(Higher−Mean):(Mean−Lower)",reason:"Alligation.",shortcut:"Cross subtract.",examTrick:"Cheaper gets larger share."}
  ],
